<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="hey-bg" x1="0" y1="0" x2="0" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#162747"/>
      <stop offset="1" stop-color="#091427"/>
    </linearGradient>
  </defs>
  <!-- Rounded-square frame matching macOS / iOS launcher tile aesthetic. -->
  <rect x="2" y="2" width="60" height="60" rx="14" ry="14" fill="url(#hey-bg)"/>
  <!-- White Dancing Script "hey" wordmark. Embedded inside Hey Social
       the font is already loaded; in standalone favicon contexts the
       cursive fallback still spells "hey" legibly. -->
  <text x="32" y="44"
        text-anchor="middle"
        font-family="'Dancing Script', 'Brush Script MT', cursive"
        font-weight="600"
        font-size="32"
        letter-spacing="0.5"
        fill="#ffffff">hey</text>
  <!-- Amber accent dot, the brand's warm tone, top-right. -->
  <circle cx="50" cy="14" r="2.5" fill="#d4b84b" opacity="0.9"/>
</svg>
